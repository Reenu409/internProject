openapi: 3.0.0

info:
  title: Mini Event Management API
  version: 1.0.0
  description: API for Event, Booking, User Bookings and Attendance

servers:
  - url: http://localhost:4000/api

paths:
  /events:
    get:
      tags:
        - Events
      summary: Get all upcoming events
      responses:
        '200':
          description: Events fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'

    post:
      tags:
        - Events
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - date
                - total_capacity
              properties:
                title:
                  type: string
                  example: Music Concert
                description:
                  type: string
                  example: Live concert in Delhi
                date:
                  type: string
                  format: date-time
                  example: 2026-04-10T18:00:00Z
                total_capacity:
                  type: integer
                  example: 100
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Event created successfully
                  data:
                    $ref: '#/components/schemas/Event'

        '400':
          description: Invalid input

  /bookings:
    get:
      tags:
        - Bookings
      summary: Get all bookings
      responses:
        '200':
          description: List of all bookings
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  totalBookings:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'

        '404':
          description: No bookings found

    post:
      tags:
        - Bookings
      summary: Book a ticket for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - event_id
              properties:
                user_id:
                  type: integer
                  example: 1
                event_id:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Ticket booked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Booking created successfully
                  booking_code:
                    type: string
                    example: EVT-7A9K21

        '400':
          description: Tickets not available or invalid data

  /users/{id}/bookings:
    get:
      tags:
        - Users
      summary: Get all bookings of a user
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1

      responses:
        '200':
          description: User bookings fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  totalBookings:
                    type: integer
                    example: 2
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserBooking'

        '404':
          description: No bookings found

  /events/{id}/attendance:
    post:
      tags:
        - Attendance
      summary: Mark attendance using booking code
      parameters:
        - name: id
          in: path
          required: true
          description: Event ID
          schema:
            type: integer
            example: 2

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_code
              properties:
                booking_code:
                  type: string
                  example: EVT-7A9K21

      responses:
        '200':
          description: Attendance marked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Attendance marked successfully
                  data:
                    $ref: '#/components/schemas/Attendance'

        '400':
          description: Attendance already marked or invalid booking code

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Music Concert
        description:
          type: string
          example: Live concert in Delhi
        date:
          type: string
          format: date-time
          example: 2026-04-10T18:00:00.000Z
        total_capacity:
          type: integer
          example: 100
        remaining_tickets:
          type: integer
          example: 95

    Booking:
      type: object
      properties:
        id:
          type: integer
          example: 12
        user_id:
          type: integer
          example: 1
        event_id:
          type: integer
          example: 2
        booking_date:
          type: string
          format: date-time
          example: 2026-04-02T10:20:00.000Z
        booking_code:
          type: string
          example: EVT-7A9K21

    UserBooking:
      type: object
      properties:
        id:
          type: integer
          example: 12
        user_id:
          type: integer
          example: 1
        event_id:
          type: integer
          example: 2
        booking_date:
          type: string
          format: date-time
          example: 2026-04-02T10:20:00.000Z
        booking_code:
          type: string
          example: EVT-7A9K21
        Event:
          $ref: '#/components/schemas/Event'

    Attendance:
      type: object
      properties:
        attendance_id:
          type: integer
          example: 5
        user_id:
          type: integer
          example: 1
        event_id:
          type: integer
          example: 2
        entry_time:
          type: string
          format: date-time
          example: 2026-04-02T11:15:00.000Z